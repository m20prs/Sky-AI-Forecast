<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyAI Forecast</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <div class="logo-container">
    <div class="logo-animation-wrapper">
        <i data-lucide="sun" class="sun-icon"></i>
        <i data-lucide="cloud-rain" class="rain-icon"></i>
        <h1 class="logo-text">Sky<span>AI</span></h1>
    </div>
</div>

        <input type="text" id="cityInput" placeholder="Enter city name...">
        <button id="getWeather">Check Weather</button>

        <div id="forecastOptions" style="display: none; margin-top: 20px; gap: 10px; justify-content: center;">
            <button onclick="showCurrent()" class="tab-btn">Current</button> 
            <button onclick="show24h()" class="tab-btn">24h Forecast</button>
            <button onclick="show30d()" class="tab-btn">16-Day Outlook</button>
        </div>

        <div id="weatherDisplay"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
